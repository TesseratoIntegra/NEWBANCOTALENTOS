# Configuracao INICIAL - apenas HTTP (para obter certificado SSL)
# Apos obter o certificado, trocar para nginx.conf

server {
    listen 80;
    server_name bancodetalentos.chiaperini.com.br www.bancodetalentos.chiaperini.com.br;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Enquanto nao tem SSL, serve normalmente via HTTP
    location /api/ {
        proxy_pass http://bancodetalentos_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/ {
        proxy_pass http://bancodetalentos_backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://bancodetalentos_backend:8000;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://bancodetalentos_backend:8000;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://bancodetalentos_frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
