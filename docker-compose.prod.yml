services:
  db:
    image: postgres:15
    container_name: bancodetalentos_postgres
    restart: always
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build: ./backend
    container_name: bancodetalentos_backend
    env_file:
      - .env.production
    environment:
      POSTGRES_HOST: bancodetalentos_postgres
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_staticfiles:/app/staticfiles
      - backend_media:/app/media
    depends_on:
      db:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: bancodetalentos_redis
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: bancodetalentos_evolution
    restart: always
    env_file:
      - .env.production
    environment:
      - SERVER_URL=https://bancodetalentos.tesseratointegra.com.br
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@bancodetalentos_postgres:5432/evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=evolution_v2
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://bancodetalentos_redis:6379/1
      - CACHE_REDIS_PREFIX_KEY=evolution_v2
      - CACHE_REDIS_SAVE_INSTANCES=true
      - CACHE_LOCAL_ENABLED=false
      - DEL_INSTANCE=false
    volumes:
      - evolution_instances:/evolution/instances
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  frontend:
    build:
      context: ./frontend
      args:
        - NEXT_PUBLIC_API_BASE_URL=https://bancodetalentos.tesseratointegra.com.br
        - NEXT_PUBLIC_API_VERSION=v1
    container_name: bancodetalentos_frontend
    environment:
      - NEXT_PUBLIC_API_BASE_URL=https://bancodetalentos.tesseratointegra.com.br
      - NEXT_PUBLIC_API_VERSION=v1
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - internal

volumes:
  pg_data:
  redis_data:
  evolution_instances:
  backend_staticfiles:
  backend_media:

networks:
  internal:
    driver: bridge
